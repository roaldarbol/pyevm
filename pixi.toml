# pixi.toml — development environment for pyevm
#
# Use this instead of uv when you want GPU-accelerated video decoding via
# torchcodec.  torchcodec has no Windows pip wheels, but conda-forge ships
# Windows CUDA builds.
#
# Install pixi:  https://pixi.sh
# Setup:         pixi install && pixi run lefthook install
# Run CLI:       pixi run pyevm phase input.mp4 output.mp4
# Run tests:     pixi run test

[workspace]
name      = "pyeulervid"
version   = "0.1.0"
channels  = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]

# ---------------------------------------------------------------------------
# Conda dependencies
# ---------------------------------------------------------------------------

[system-requirements]
cuda = "12.8"  # driver 591.86 supports up to CUDA 13.1; toolkit 12.8 is what torch uses

[dependencies]
python = ">=3.12,<3.14"

# conda-forge lags pip by weeks; pin to the latest available version (2.10).
# When conda-forge catches up to 2.11, bump pytorch and torchcodec together.
pytorch = "2.10.*"

# torchcodec — CUDA build on win-64/linux-64, CPU build on osx-64.
# Version must match the pytorch version above (0.10 ↔ pytorch 2.10).
[target.win-64.dependencies]
torchcodec = { version = "0.10.*", build = "*cuda*" }

[target.linux-64.dependencies]
torchcodec = { version = "0.10.*", build = "*cuda*" }

[target.osx-64.dependencies]
torchcodec = { version = "0.10.*" }  # CPU-only build

# ---------------------------------------------------------------------------
# PyPI dependencies
# ---------------------------------------------------------------------------
# Everything else is pip-only or works best from PyPI.

[pypi-dependencies]
# Install the project itself in editable mode.
# torch is already satisfied by the conda pytorch package above, so pip
# will skip it when resolving pyeulervid's dependencies.
pyeulervid = { path = ".", editable = true, extras = ["dev", "docs"] }

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------

[tasks]
# Testing
test         = "python -m pytest"
test-cov     = "python -m pytest --cov=pyevm --cov-report=term-missing --cov-report=xml"

# Linting / formatting
lint         = "ruff check src tests"
format       = "ruff format src tests"
lint-fix     = "ruff check --fix src tests"

# Git hooks
lefthook     = "lefthook"

# Security
audit        = "pip-audit"

# Docs
docs         = "zensical build"
docs-serve   = "zensical serve"

# CLI shortcut
pyevm        = "python -m pyevm.cli"
